<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kaka Halwai</title>
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>
  <!-- Header Section -->
  <div class="header">
    <div class="branding">
      <img src="https://www.kakahalwai.com/cdn/shop/files/KHSC_LOGO_600x.png?v=1662649341" alt="Kaka Halwai Logo" />
    </div>

    <div class="menu">
      <nav>
        <ul class="menu-list">
          <li>About</li>
          <li>Sweets</li>
          <li>My Order</li>
        </ul>
      </nav>
    </div>

    <div class="profile-btn">
      <img src="https://raw.githack.com/coppercloud-iotech/staticfiles/main/pwa-icons/Icons/user-icon.svg"
        alt="Profile" class="profile-pic">
    </div>
  </div>

  <div class="login-container">
    <div class="login-box">
      <h1 class="login-title">Login</h1>
      <p class="login-subtitle">Please login using account detail bellow.</p>

      <form class="login-form">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" class="signin-btn">Sign In</button>

        <div class="form-footer">
          <a href="#" class="forgot-password">Forgot your password?</a>
        </div>

        <div class="create-account">
          <a href="#">Create account</a>
        </div>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
